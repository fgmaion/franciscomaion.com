<nav class="site-nav">
  <div class="nav-inner">
    <a href="{{ .Site.Home.RelPermalink }}" class="nav-brand">
      Francisco <span>Maion</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <i class="fa-solid fa-bars"></i>
    </button>
    <ul class="nav-links">
      <li><a href="{{ .Site.Home.RelPermalink }}"{{ if .IsHome }} class="active"{{ end }}>Home</a></li>
      {{ $current := . }}
      {{ range .Site.Menus.main.ByWeight }}
      <li>
        <a href="{{ absURL .URL }}"{{ if or ($current.IsMenuCurrent "main" .) ($current.HasMenuCurrent "main" .) }} class="active"{{ end }}>{{ .Title }}</a>
      </li>
      {{ end }}
    </ul>
  </div>
</nav>
