{{ define "main" }}
<section class="hero">
  <div class="hero-layout">
    <div class="hero-photo">
      <img src="{{ "img/profile.jpg" | relURL }}" alt="Francisco Maion">
    </div>
    <div class="hero-inner">
      <span class="hero-tag">Welcome</span>
      <h1 class="hero-title">Hi, I'm <span>Francisco Maion</span></h1>
      <p class="hero-sub">Postdoc working on Computational Cosmology</p>
      <p class="hero-loc">Columbia University, New York</p>
      <div class="hero-actions">
        <a href="{{ "about" | relURL }}" class="btn btn-primary">About me</a>
        <a href="{{ "research" | relURL }}" class="btn btn-outline">My research</a>
      </div>
    </div>
  </div>
</section>
{{ end }}
