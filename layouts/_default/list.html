{{ define "main" }}
<div class="page-wrap">
  <div class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
  </div>
  <div class="page-content clearfix">
    {{ .Content | safeHTML }}
    {{ range .Pages.ByWeight }}
    <p><a href="{{ .RelPermalink }}">{{ .Title }}</a></p>
    {{ end }}
  </div>
</div>
{{ end }}
